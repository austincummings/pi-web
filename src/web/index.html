<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>pi-web</title>
        <style>
            :root {
                /* defaults; overridden at runtime by the active pi theme
                   (settings.json -> themes/<name>.json) via a "theme" frame */
                --bg: #0b0f14;
                --panel: #121821;
                --line: #1f2a37;
                --txt: #d7e0ea;
                --muted: #9fb0c0;
                --dim: #7d8aa0;
                --acc: #6aa0ff;
                --acc2: #8b5cf6;
                --ok: #4ec9a3;
                --warn: #d9a441;
                --err: #e0556a;
                /* thinking-level composer border colors (mirror pi-tui
                   theme.getThinkingBorderColor; bashMode is green) */
                --think-off: #7d8aa0;
                --think-minimal: #6e6e6e;
                --think-low: #5f87af;
                --think-medium: #81a2be;
                --think-high: #b294bb;
                --think-xhigh: #d183e8;
                --bash-mode: #4ec9a3;
                /* tool-card status tints + title/output (literal theme slots,
                   mirroring the pi TUI's toolPendingBg/toolSuccessBg/toolErrorBg
                   rather than a hard-coded color-mix wash) */
                --tool-pending-bg: #121821;
                --tool-success-bg: #0c1c17;
                --tool-error-bg: #23171a;
                --tool-title: var(--acc);
                --tool-output: var(--muted);
                /* markdown styling */
                --md-heading: var(--acc);
                --md-link: var(--acc);
                --md-link-url: #4fc4c4;
                --md-code: var(--ok);
                --md-code-block: var(--txt);
                --md-code-block-border: var(--line);
                --md-quote: var(--dim);
                --md-quote-border: var(--dim);
                --md-hr: var(--dim);
                --md-list-bullet: var(--acc2);
                /* diff colors (pairs with #19) */
                --diff-added: var(--ok);
                --diff-removed: var(--err);
                --diff-context: var(--muted);
                /* syntax highlighting slots (pairs with #19) */
                --syn-comment: #4a5560;
                --syn-keyword: var(--acc);
                --syn-function: var(--txt);
                --syn-variable: var(--txt);
                --syn-string: var(--ok);
                --syn-number: var(--warn);
                --syn-type: #4fc4c4;
                --syn-operator: var(--muted);
                --syn-punctuation: var(--muted);
                /* message styling */
                --selected-bg: #243240;
                --user-msg-bg: var(--panel);
                --user-msg-text: var(--txt);
                --custom-msg-bg: #162028;
                --custom-msg-text: var(--txt);
                --custom-msg-label: var(--acc);
                /* misc raw palette slots (exposed for extensions / future use) */
                --hover: #162028;
                --border-variant: #243240;
                --comment: #4a5560;
                --cyan: #4fc4c4;
                --bright-cyan: #88e5e5;
                --dim-blue: #1f6b92;
            }
            *::selection {
                background: var(--acc);
                color: var(--bg);
            }
            *::-moz-selection {
                background: var(--acc);
                color: var(--bg);
            }
            *::-webkit-selection {
                background: var(--acc);
                color: var(--bg);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font:
                    14px/1.5 ui-monospace,
                    SFMono-Regular,
                    Menlo,
                    monospace;
                background: var(--bg);
                color: var(--txt);
                height: 100vh;
                display: flex;
            }
            .col {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            #center {
                flex: 1 1 auto;
                min-width: 0;
            }
            /* extension docks (left / right rails, bottom tray) */
            .dock.side {
                flex: 0 0 320px;
                min-width: 260px;
                overflow: auto;
                padding: 14px;
                display: flex;
                flex-direction: column;
                gap: 14px;
                background: var(--bg);
            }
            #dock-left {
                border-right: 1px solid var(--line);
            }
            #dock-right {
                border-left: 1px solid var(--line);
            }
            /* bottom = above the prompt; footer = below the prompt */
            .dock.bottom,
            .dock.footer {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                padding: 12px 14px;
                border-top: 1px solid var(--line);
            }
            .dock.bottom > .surface,
            .dock.footer > .surface {
                flex: 1 1 240px;
            }
            .dock.empty-dock {
                display: none;
            }
            header {
                padding: 10px 14px;
                border-bottom: 1px solid var(--line);
                display: flex;
                gap: 10px;
                align-items: center;
            }
            header b {
                color: var(--acc);
            }
            header .sp {
                flex: 1;
            }
            .thread-title {
                color: var(--txt);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 360px;
            }
            .thread-title .hint {
                color: var(--dim);
            }
            button {
                font: inherit;
                background: var(--panel);
                color: var(--txt);
                border: 1px solid var(--line);
                border-radius: 6px;
                padding: 5px 10px;
                cursor: pointer;
            }
            button:hover {
                border-color: var(--acc);
            }
            button.primary {
                background: var(--acc);
                border: none;
                color: #fff;
            }
            #transcript {
                flex: 1;
                overflow: auto;
                padding: 14px;
            }
            /* ---- Scrollbars: one consistent treatment everywhere ----------
               (transcript, composer, overlays, docks, picker, ...). Firefox
               uses scrollbar-width/-color; WebKit/Blink use the pseudo-elements
               below. The thumb is inset with a --bg border so it reads as a
               thin pill, and brightens to the accent on hover. */
            * {
                scrollbar-width: thin;
                scrollbar-color: var(--line) transparent;
            }
            *::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }
            *::-webkit-scrollbar-track {
                background: transparent;
            }
            *::-webkit-scrollbar-thumb {
                background: var(--line);
                border-radius: 8px;
                border: 2px solid var(--bg);
            }
            *::-webkit-scrollbar-thumb:hover {
                background: var(--acc);
            }
            *::-webkit-scrollbar-corner {
                background: transparent;
            }
            /* surface cards (docks) */
            .surface {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                overflow: hidden;
            }
            .surface > .stitle {
                padding: 8px 12px;
                border-bottom: 1px solid var(--line);
                color: var(--acc);
                font-size: 14px;
            }
            .surface > .sbody {
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            /* keyed status segments (bottom bar) */
            /* default below-composer context bar (mirrors the pi TUI footer:
               pwd/session line + token-stats / model•thinking line) */
            .contextbar {
                display: none;
                flex-direction: column;
                gap: 1px;
                padding: 4px 14px;
                border-top: 1px solid var(--line);
                color: var(--dim);
                font-size: 14px;
                line-height: 1.4;
            }
            .contextbar.show {
                display: flex;
            }
            .contextbar .line {
                display: flex;
                gap: 8px;
                white-space: pre;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .contextbar .line .spacer {
                margin-left: auto;
            }
            .contextbar .ctx-warn {
                color: var(--warn);
            }
            .contextbar .ctx-err {
                color: var(--err);
            }
            /* avoid a double divider when both bars are visible */
            .contextbar.show + .statusbar.show {
                border-top: none;
            }
            .statusbar {
                display: none;
                gap: 14px;
                padding: 4px 14px;
                border-top: 1px solid var(--line);
                color: var(--dim);
                font-size: 14px;
            }
            .statusbar.show {
                display: flex;
            }
            .statusbar .seg.right {
                margin-left: auto;
            }
            .statusbar .tone-accent {
                color: var(--acc);
            }
            .statusbar .tone-text {
                color: var(--txt);
            }
            .statusbar .tone-muted {
                color: var(--muted);
            }
            .statusbar .tone-dim {
                color: var(--dim);
            }
            .statusbar .tone-success {
                color: var(--ok);
            }
            .statusbar .tone-warning {
                color: var(--warn);
            }
            .statusbar .tone-error {
                color: var(--err);
            }
            /* extension overlays (modal surfaces) */
            #overlay-layer {
                position: fixed;
                inset: 0;
                display: none;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.5);
                z-index: 50;
            }
            #overlay-layer.show {
                display: flex;
            }
            .ov-card {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 12px;
                width: min(480px, 92vw);
                max-height: 80vh;
                overflow: auto;
                box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            }
            .ov-card > .ov-title {
                padding: 10px 14px;
                border-bottom: 1px solid var(--line);
                color: var(--acc);
                font-size: 14px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .ov-card > .ov-body {
                padding: 14px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            /* toasts (notify) */
            #toast-layer {
                position: fixed;
                right: 16px;
                bottom: 16px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                z-index: 60;
            }
            .toast {
                background: var(--panel);
                border: 1px solid var(--line);
                border-left-width: 3px;
                padding: 8px 12px;
                max-width: 320px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
                font-size: 14px;
            }
            .toast.info {
                border-left-color: var(--acc);
            }
            .toast.warning {
                border-left-color: var(--warn);
            }
            .toast.error {
                border-left-color: var(--err);
            }
            .msg {
                margin: 0 0 12px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .msg .role {
                color: var(--dim);
                font-size: 14px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .msg.assistant .body {
                white-space: normal;
            }
            /* Markdown surface nodes (e.g. extension-rendered custom messages)
               render inside .msg's pre-wrap context. Reset to normal so the
               newlines renderMarkdown puts *between* block tags (</p>\n<p>)
               aren't shown as blank lines; fenced code keeps its own <pre>
               whitespace. */
            .md {
                white-space: normal;
            }
            /* User turns get the theme's userMessageBg/Text wash (the TUI tints
               the whole user block); customMessage* + selectedBg vars are exposed
               in :root for extension-rendered messages (folds toward #19). */
            .msg.user .body {
                background: var(--user-msg-bg);
                color: var(--user-msg-text);
                border-radius: 6px;
                padding: 6px 10px;
            }
            .msg.custom .role {
                color: var(--custom-msg-label);
            }
            .msg.custom .body {
                background: var(--custom-msg-bg);
                color: var(--custom-msg-text);
                border-radius: 6px;
                padding: 6px 10px;
            }
            /* pi TUI parity: a registered message renderer owns its styling, so
               tree-rendered custom messages drop the customMessageBg wash and
               let the renderer control the background. */
            .msg.custom .body.bare {
                background: none;
                border-radius: 0;
                padding: 0;
            }
            .msg .body p {
                margin: 6px 0;
            }
            .msg .body h1,
            .msg .body h2,
            .msg .body h3,
            .msg .body h4 {
                margin: 10px 0 4px;
                line-height: 1.3;
                color: var(--md-heading);
            }
            .msg .body ul,
            .msg .body ol {
                margin: 6px 0;
                padding-left: 20px;
            }
            .msg .body ul li::marker {
                color: var(--md-list-bullet);
            }
            .msg .body a {
                color: var(--md-link);
            }
            .msg .body hr {
                border: none;
                border-top: 1px solid var(--md-hr);
                margin: 10px 0;
            }
            .msg .body code {
                background: #0c1117;
                border: 1px solid var(--line);
                border-radius: 4px;
                padding: 0 4px;
                font-size: inherit;
                color: var(--md-code);
            }
            .msg .body pre {
                background: #0c1117;
                border: 1px solid var(--md-code-block-border);
                border-radius: 6px;
                padding: 8px 10px;
                overflow: auto;
                margin: 6px 0;
            }
            .msg .body pre code {
                background: none;
                border: none;
                padding: 0;
                color: var(--md-code-block);
            }
            /* Syntax tokens for highlighted code inside markdown code blocks
               (`Markdown` node + the assistant transcript). highlight.js emits
               <span class="hljs-*"> inside <pre><code> (see src/web/highlight.ts),
               mapped here to the theme --syn-* palette. This is the same
               class→palette convention the tree-sitter extensions use
               (.pi/extensions/_shared/multibuffer.ts), kept in sync so a
               transcript code block and an extension-rendered one match. */
            .hljs-comment,
            .hljs-quote {
                color: var(--syn-comment);
                font-style: italic;
            }
            .hljs-keyword,
            .hljs-selector-tag,
            .hljs-name,
            .hljs-built_in,
            .hljs-literal {
                color: var(--syn-keyword);
            }
            .hljs-string,
            .hljs-regexp,
            .hljs-meta .hljs-string,
            .hljs-symbol,
            .hljs-bullet {
                color: var(--syn-string);
            }
            .hljs-number {
                color: var(--syn-number);
            }
            .hljs-title,
            .hljs-title.function_,
            .hljs-section,
            .hljs-selector-id,
            .hljs-link {
                color: var(--syn-function);
            }
            .hljs-type,
            .hljs-class .hljs-title,
            .hljs-title.class_,
            .hljs-attribute,
            .hljs-selector-class {
                color: var(--syn-type);
            }
            .hljs-variable,
            .hljs-template-variable,
            .hljs-attr,
            .hljs-property,
            .hljs-params {
                color: var(--syn-variable);
            }
            .hljs-operator {
                color: var(--syn-operator);
            }
            .hljs-punctuation {
                color: var(--syn-punctuation);
            }
            .hljs-meta {
                color: var(--syn-comment);
            }
            .hljs-emphasis {
                font-style: italic;
            }
            .hljs-strong {
                font-weight: 600;
            }
            .msg .body blockquote {
                border-left: 2px solid var(--md-quote-border);
                margin: 6px 0;
                padding-left: 10px;
                color: var(--md-quote);
            }
            /* Tables scroll within their own wrapper so a wide table can't
               overrun the transcript's right edge (see TODO #6). */
            .msg .body .table-wrap {
                overflow-x: auto;
                margin: 6px 0;
            }
            .msg .body table {
                border-collapse: collapse;
                font-size: inherit;
            }
            .msg .body th,
            .msg .body td {
                border: 1px solid var(--line);
                padding: 4px 8px;
                text-align: left;
            }
            .msg .body thead th {
                background: var(--panel);
                font-weight: 600;
            }
            /* The TUI conveys status by tinting the whole tool block with the
               theme's literal toolPendingBg / toolSuccessBg / toolErrorBg colors
               (no glyph), so we wash the entire card with those exact vars and
               match the left border to the status accent. Default = success. */
            .tool {
                display: block;
                color: var(--dim);
                border-left: 2px solid var(--ok);
                background: var(--tool-success-bg);
                padding: 5px 8px;
                margin: 6px 0;
                font-size: 14px;
                border-radius: 0 4px 4px 0;
            }
            .tool.pending {
                border-left-color: var(--acc);
                background: var(--tool-pending-bg);
            }
            .tool.error {
                border-left-color: var(--err);
                background: var(--tool-error-bg);
            }
            .tool-head {
                display: flex;
                align-items: baseline;
                white-space: nowrap;
                overflow: hidden;
            }
            .tool-name {
                color: var(--tool-title);
                font-weight: 600;
                margin-right: 6px;
            }
            /* args ellipsize first (min-width:0); the muted suffix stays put. */
            .tool-args {
                color: var(--acc);
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .tool-dim {
                color: var(--dim);
                white-space: pre;
                flex-shrink: 0;
            }
            /* The card itself carries the status wash, so the body is transparent.
               Output text uses the theme's toolOutput slot (muted in the TUI). */
            .tool-body {
                margin: 4px 0 0;
                padding: 0;
                background: none;
                color: var(--tool-output);
                font-size: 14px;
                white-space: pre-wrap;
                word-break: break-word;
                overflow-x: auto;
                max-width: 100%;
            }
            /* AnsiBlock: a pi TUI Component's render(width) output painted into
               the DOM (render-model parity). Monospace, non-wrapping so the
               component's column alignment survives; colors come from ansi.ts
               (theme CSS vars / rgb). One .ansi-line per rendered line. */
            .ansi {
                margin: 4px 0 0;
                font-family: ui-monospace, Menlo, monospace;
                font-size: 14px;
                line-height: 1.5;
                white-space: pre;
                overflow-x: auto;
                max-width: 100%;
            }
            .ansi-line {
                min-height: 1.5em;
            }
            .ansi a {
                color: var(--acc);
            }
            /* Image: a pi-tui Image component lifted to a real <img> via a data
               URI (render-model parity §7.4). The terminal renders it as pixel
               cells; the DOM shows the actual image, bounded to the card width. */
            .pi-img {
                display: block;
                margin: 4px 0 0;
                max-width: 100%;
                height: auto;
                border-radius: 6px;
            }
            /* Diff body (edit results): one span per line, colored by the
               theme's toolDiff* slots; changed tokens carry .inverse. Mirrors
               pi-tui's renderDiff. Kept monospace + non-wrapping so line numbers
               and alignment survive. */
            .tool-body.diff {
                white-space: pre;
                word-break: normal;
            }
            .tool-body.diff .diff-context {
                color: var(--diff-context);
            }
            .tool-body.diff .diff-added {
                color: var(--diff-added);
            }
            .tool-body.diff .diff-removed {
                color: var(--diff-removed);
            }
            /* web analogue of theme.inverse(): swap fg/bg to highlight the
               changed tokens within a single-line modification. The background
               must reference the enclosing line color explicitly: `currentColor`
               here would resolve to this element's own `color` (var(--bg)),
               producing a solid block with invisible text. */
            .tool-body.diff .inverse {
                color: var(--bg);
            }
            .tool-body.diff .diff-added .inverse {
                background: var(--diff-added);
            }
            .tool-body.diff .diff-removed .inverse {
                background: var(--diff-removed);
            }
            .tool-more {
                margin-top: 3px;
                color: var(--acc2);
                font-size: 14px;
                cursor: pointer;
                user-select: none;
            }
            .tool-more:hover {
                color: var(--acc);
            }
            .thinking-block {
                display: block; /* <pi-thinking> is a custom element (inline by default) */
                border-left: 2px solid var(--acc2);
                padding-left: 10px;
                margin: 8px 0;
                color: var(--dim);
                font-size: 14px;
            }
            /* The TUI shows no header while the trace is expanded — just the
               dim, italic reasoning text. The header only appears once the
               block is collapsed, where pi renders a static italic
               "Thinking..." label in the thinking color (hiddenThinkingLabel). */
            .thinking-block .think-head {
                display: none;
                color: var(--dim);
                font-size: 14px;
                font-style: italic;
                cursor: pointer;
                user-select: none;
            }

            .thinking-block .think-body {
                margin-top: 4px;
                font-style: italic;
            }
            .thinking-block .think-body p {
                margin: 4px 0;
            }
            /* Inline code / fenced blocks keep their highlight even inside the
               dimmed reasoning text, mirroring how the TUI tints backticked
               spans (matches `.msg .body code`). */
            .thinking-block .think-body code {
                background: #0c1117;
                border: 1px solid var(--line);
                border-radius: 4px;
                padding: 0 4px;
                font-size: inherit;
                color: var(--md-code);
            }
            .thinking-block .think-body pre {
                font-style: normal;
                background: #0c1117;
                border: 1px solid var(--md-code-block-border);
                border-radius: 6px;
                padding: 8px 10px;
                overflow: auto;
                margin: 6px 0;
            }
            .thinking-block .think-body pre code {
                background: none;
                border: none;
                padding: 0;
                color: var(--md-code-block);
            }
            /* Alt+T collapses the trace: hide the body and surface the header
               as pi's sole italic "Thinking..." label. Mirrors pi's behavior. */
            body.hide-thinking .thinking-block .think-head {
                display: block;
            }
            body.hide-thinking .thinking-block .think-body {
                display: none;
            }
            .bash {
                display: block;
                margin: 8px 0;
                border-top: 1px solid var(--bash-mode);
                border-bottom: 1px solid var(--bash-mode);
                padding: 4px 8px;
            }
            .bash.excluded {
                border-color: var(--dim);
            }
            .bash-cmd {
                color: var(--bash-mode);
                font-weight: 700;
                font-size: 14px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .bash .body {
                margin: 4px 0 0;
                white-space: pre-wrap;
                word-break: break-word;
                font-size: 14px;
                color: var(--muted);
            }
            .bash-run {
                margin-top: 4px;
                font-size: 14px;
                color: var(--muted);
            }
            .bash-run .spin {
                color: var(--bash-mode);
                margin-right: 6px;
            }
            .bash.excluded .bash-run .spin {
                color: var(--dim);
            }
            .bash-more {
                margin-top: 4px;
                font-size: 14px;
                color: var(--muted);
                cursor: pointer;
            }
            .bash-more:hover {
                color: var(--txt);
            }
            .bash-status {
                margin-top: 4px;
                font-size: 14px;
            }
            .bash-status.err {
                color: var(--err);
            }
            .bash-status.warn {
                color: var(--warn);
            }
            .panel {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                overflow: hidden;
            }
            .panel > .ptitle {
                padding: 8px 12px;
                border-bottom: 1px solid var(--line);
                color: var(--acc);
                font-size: 14px;
            }
            .panel > .pbody {
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .divider {
                height: 1px;
                background: var(--line);
                margin: 4px 0;
            }
            input[type="text"] {
                font: inherit;
                background: #0c1117;
                border: 1px solid var(--line);
                color: var(--txt);
                border-radius: 6px;
                padding: 6px 8px;
                width: 100%;
            }
            .composer {
                position: relative;
            }
            /* "Working" spinner above the input (matches pi-tui: braille
               frames @ 80ms, accent spinner + muted label) */
            .working {
                display: none;
                align-items: center;
                gap: 8px;
                padding: 6px 14px 0;
                font-size: 14px;
                color: var(--dim);
            }
            .working.show {
                display: flex;
            }
            /* Pending steering/follow-up messages waiting while a turn is in
               flight (mirrors the pi TUI's pending-messages display). Click a
               row to pop the whole queue back into the composer to edit. */
            .queued {
                display: none;
                flex-direction: column;
                gap: 4px;
                padding: 8px 14px 0;
            }
            .queued.show {
                display: flex;
            }
            .queued .queued-item {
                display: flex;
                align-items: baseline;
                gap: 8px;
                font-size: 14px;
                color: var(--dim);
                background: color-mix(in srgb, var(--acc) 8%, transparent);
                border-left: 2px solid var(--acc);
                padding: 4px 8px;
                cursor: pointer;
            }
            .queued .queued-item:hover {
                color: var(--txt);
            }
            .queued .queued-badge {
                color: var(--acc);
                flex: 0 0 auto;
            }
            .queued .queued-text {
                flex: 1 1 auto;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .queued .queued-hint {
                flex: 0 0 auto;
                font-size: 11px;
                opacity: 0.7;
            }
            .working .spin {
                color: var(--acc);
                display: inline-block;
                width: 1ch;
                text-align: center;
            }
            /* Pending pasted/attached images waiting below the composer,
               shown as removable thumbnail chips until the message is sent. */
            .attachments {
                display: none;
                flex-wrap: wrap;
                gap: 8px;
                padding: 8px 14px 0;
            }
            .attachments.show {
                display: flex;
            }
            .attach-chip {
                position: relative;
                width: 56px;
                height: 56px;
                border-radius: 6px;
                overflow: hidden;
                border: 1px solid var(--line);
                background: #0c1117;
            }
            .attach-chip img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .attach-remove {
                position: absolute;
                top: 2px;
                right: 2px;
                width: 18px;
                height: 18px;
                line-height: 16px;
                padding: 0;
                border: none;
                border-radius: 50%;
                background: rgba(0, 0, 0, 0.65);
                color: #fff;
                font-size: 14px;
                cursor: pointer;
            }
            .attach-remove:hover {
                background: rgba(0, 0, 0, 0.85);
            }
            /* Inline image thumbnails rendered inside a transcript bubble. */
            .msg-images {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 8px;
            }
            .msg-image {
                max-width: 240px;
                max-height: 240px;
                border-radius: 6px;
                border: 1px solid var(--line);
                cursor: pointer;
            }
            form#ask {
                display: flex;
                gap: 8px;
                padding: 12px 14px;
                border-top: 1px solid var(--line);
                align-items: flex-end;
            }
            /* The composer is a backdrop-highlight editor: a real <textarea>
               (transparent text, visible caret) stacked over a #backdrop <div>
               that mirrors the text glyph-for-glyph with markdown tints. The
               box chrome (bg + border) lives on .input-wrap so the backdrop
               shows through. Monospace font keeps bold/italic metrics identical
               to the textarea, so the caret stays aligned. */
            .input-wrap {
                position: relative;
                flex: 1;
                display: flex;
                background: #0c1117;
                border: 1px solid var(--line);
                border-radius: 6px;
                overflow: hidden;
            }
            .backdrop {
                position: absolute;
                inset: 0;
                margin: 0;
                padding: 6px 8px;
                font: inherit;
                line-height: 1.4;
                color: var(--txt);
                white-space: pre-wrap;
                overflow-wrap: break-word;
                word-break: break-word;
                pointer-events: none;
                overflow: hidden;
                box-sizing: border-box;
            }
            form#ask #prompt {
                flex: 1;
                position: relative;
                z-index: 1;
                width: 100%;
                box-sizing: border-box;
                font: inherit;
                background: transparent;
                border: 0;
                margin: 0;
                color: transparent;
                caret-color: var(--txt);
                padding: 6px 8px;
                resize: none;
                overflow-y: auto;
                max-height: 200px;
                line-height: 1.4;
                white-space: pre-wrap;
                overflow-wrap: break-word;
                word-break: break-word;
            }
            /* markdown token tints (color / weight / style only — never metrics) */
            .backdrop .md-h {
                color: var(--md-heading);
                font-weight: 700;
            }
            .backdrop .md-code {
                color: var(--md-code);
            }
            .backdrop .md-link {
                color: var(--md-link);
                text-decoration: underline;
            }
            .backdrop .md-strong {
                font-weight: 700;
            }
            .backdrop .md-em {
                font-style: italic;
            }
            .backdrop .md-quote {
                color: var(--md-quote);
            }
            .backdrop .md-marker {
                color: var(--md-list-bullet);
            }
            .backdrop .md-mention {
                color: var(--acc2);
            }
            .backdrop .md-cmd {
                color: var(--bash-mode);
                font-weight: 700;
            }
            /* Focused composer border reflects the reasoning level (set on the
               parent .composer via data-think); data-bash overrides it while
               the input is a `!` shell command. Only tinted while focused. */
            form#ask #prompt:focus {
                outline: none;
            }
            form#ask .input-wrap:focus-within {
                border-color: var(--think-off);
            }
            .composer[data-think="minimal"] form#ask .input-wrap:focus-within {
                border-color: var(--think-minimal);
            }
            .composer[data-think="low"] form#ask .input-wrap:focus-within {
                border-color: var(--think-low);
            }
            .composer[data-think="medium"] form#ask .input-wrap:focus-within {
                border-color: var(--think-medium);
            }
            .composer[data-think="high"] form#ask .input-wrap:focus-within {
                border-color: var(--think-high);
            }
            .composer[data-think="xhigh"] form#ask .input-wrap:focus-within {
                border-color: var(--think-xhigh);
            }
            .composer[data-bash] form#ask .input-wrap:focus-within {
                border-color: var(--bash-mode);
            }
            .empty {
                color: var(--dim);
            }
            /* startup / reload intro view (banner + loaded resources), echoing
               the pi TUI header. Rendered as the first transcript entry (scrolls
               with content) and click-to-expand (collapsed shows compact comma
               lists; expanded one per line). */
            .welcome {
                padding: 4px 0 10px;
                font-size: 14px;
                line-height: 1.5;
                cursor: pointer;
                user-select: none;
            }
            .welcome .logo {
                font-weight: 700;
                color: var(--acc);
            }
            .welcome .logo .ver {
                color: var(--dim);
                font-weight: 400;
            }
            .welcome .hints {
                color: var(--muted);
            }
            .welcome .onboard {
                color: var(--dim);
                margin-top: 4px;
            }
            .welcome .sections {
                margin-top: 8px;
            }
            .welcome .sec {
                margin-top: 4px;
            }
            .welcome .sec-name {
                color: var(--acc2);
                font-weight: 600;
            }
            .welcome .sec-items {
                color: var(--dim);
            }
            .welcome.expanded .sec-items {
                white-space: pre;
                display: block;
                margin-left: 1em;
            }
            .welcome .toggle {
                color: var(--dim);
                margin-top: 6px;
                font-size: 14px;
            }
            /* fuzzy command typeahead (above the prompt) */
            .ac {
                position: absolute;
                left: 14px;
                right: 14px;
                bottom: 100%;
                margin-bottom: 6px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 8px;
                max-height: 40vh;
                overflow-y: auto;
                display: none;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            }
            .ac.show {
                display: block;
            }
            .ac .opt {
                padding: 7px 12px;
                display: flex;
                gap: 12px;
                align-items: baseline;
                cursor: pointer;
            }
            .ac .opt.sel {
                background: #0c1117;
            }
            .ac .opt .cmd {
                color: var(--acc);
            }
            .ac .opt .desc {
                color: var(--dim);
                font-size: 14px;
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            /* /resume thread picker overlay */
            #overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                display: none;
                align-items: flex-start;
                justify-content: center;
            }
            #overlay.show {
                display: flex;
            }
            .picker {
                margin-top: 12vh;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                width: min(820px, 90vw);
                max-height: 70vh;
                overflow: auto;
            }
            .picker h3 {
                margin: 0;
                padding: 12px 14px;
                font-size: 14px;
                color: var(--dim);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                border-bottom: 1px solid var(--line);
            }
            .picker .item {
                padding: 10px 14px;
                border-bottom: 1px solid var(--line);
                cursor: pointer;
                display: flex;
                gap: 10px;
                align-items: baseline;
            }
            .picker .item:hover,
            .picker .item.sel {
                background: #0c1117;
            }
            .picker .item.sel {
                box-shadow: inset 2px 0 0 var(--acc);
            }
            .picker .item .name {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .picker .item .meta {
                color: var(--dim);
                font-size: 14px;
            }
            .picker .item.active .name {
                color: var(--acc);
            }
            .picker .item.new {
                color: var(--acc2);
            }
            /* delete-confirmation: target row + hint turn red (TUI parity) */
            .picker .item.confirm-delete .name,
            .picker .item.confirm-delete .meta {
                color: var(--err);
            }
            .picker .item.confirm-delete {
                box-shadow: inset 2px 0 0 var(--err);
            }
            .picker .picker-hint {
                padding: 8px 14px;
                font-size: 14px;
                color: var(--dim);
                border-bottom: 1px solid var(--line);
            }
            .picker .picker-hint.danger {
                color: var(--err);
            }
            /* blocking dialogs (piweb select/confirm/input/editor) */
            #dialog {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                display: none;
                align-items: flex-start;
                justify-content: center;
                z-index: 60;
            }
            #dialog.show {
                display: flex;
            }
            .dialog-card {
                margin-top: 16vh;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                width: min(560px, 90vw);
                max-height: 68vh;
                overflow: auto;
            }
            .dialog-card h3 {
                margin: 0;
                padding: 12px 14px;
                font-size: 14px;
                color: var(--dim);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                border-bottom: 1px solid var(--line);
            }
            .dialog-body {
                padding: 12px 14px;
            }
            .dialog-card .item {
                padding: 9px 12px;
                border: 1px solid var(--line);
                border-radius: 6px;
                margin-bottom: 6px;
                cursor: pointer;
            }
            .dialog-card .item.sel,
            .dialog-card .item:hover {
                border-color: var(--acc);
                box-shadow: inset 2px 0 0 var(--acc);
            }
            .dialog-msg {
                margin-bottom: 14px;
                color: var(--txt);
                white-space: pre-wrap;
            }
            .dialog-field {
                display: block;
                width: 100%;
                box-sizing: border-box;
                padding: 8px 10px;
                margin-bottom: 12px;
                background: var(--bg);
                color: var(--txt);
                border: 1px solid var(--line);
                border-radius: 6px;
                font: inherit;
                resize: vertical;
            }
            .dialog-field:focus {
                outline: none;
                border-color: var(--acc);
            }
            .dialog-btns {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
            }
            /* /model picker: search box + scrollable list */
            .picker .model-search {
                display: block;
                width: calc(100% - 28px);
                margin: 10px 14px;
                padding: 8px 10px;
                background: var(--bg);
                border: 1px solid var(--line);
                border-radius: 6px;
                color: var(--txt);
                font: inherit;
            }
            .picker .model-search:focus {
                outline: none;
                border-color: var(--acc);
            }
            .picker .model-list {
                border-top: 1px solid var(--line);
            }
            /* per-directory section header when threads span multiple cwds */
            .picker .dir-head {
                padding: 8px 14px 4px;
                font-size: 14px;
                color: var(--dim);
                letter-spacing: 0.06em;
                background: #0c1117;
                border-bottom: 1px solid var(--line);
            }
        </style>
    </head>
    <body>
        <aside id="dock-left" class="dock side empty-dock"></aside>
        <div id="center" class="col">
            <header>
                <span
                    id="threadTitle"
                    class="thread-title"
                    title="current thread"
                    ><span class="hint">(loading…)</span></span
                >
                <span class="sp"></span>
                <span id="status" class="empty">connecting…</span>
            </header>
            <div id="transcript">
                <div class="empty">
                    Ask pi something, or use a dock registered by an extension →
                    <br />Type <b>/</b> for commands — <b>/resume</b> to switch
                    threads, <b>/new</b> for a fresh one. <br />Run shell with
                    <b>!</b> (output in context) or <b>!!</b> (local only).
                </div>
            </div>
            <div id="dock-bottom" class="dock bottom empty-dock"></div>
            <div class="composer">
                <div id="ac" class="ac"></div>
                <div id="queued" class="queued" aria-live="polite"></div>
                <div id="working" class="working" aria-live="polite">
                    <span class="spin"></span
                    ><span class="label">Working…</span>
                </div>
                <div
                    id="attachments"
                    class="attachments"
                    aria-live="polite"
                ></div>
                <form id="ask">
                    <div class="input-wrap">
                        <div
                            id="backdrop"
                            class="backdrop"
                            aria-hidden="true"
                        ></div>
                        <textarea
                            id="prompt"
                            rows="1"
                            placeholder="message pi…  (/ commands · ! shell · @ files)"
                            autocomplete="off"
                            autofocus
                        ></textarea>
                    </div>
                </form>
            </div>
            <div id="dock-footer" class="dock footer empty-dock"></div>
            <div id="contextbar" class="contextbar"></div>
            <div id="statusbar" class="statusbar"></div>
        </div>
        <aside id="dock-right" class="dock side empty-dock"></aside>
        <div id="overlay-layer"></div>
        <div id="toast-layer"></div>
        <div id="overlay"><div class="picker" id="picker"></div></div>
        <div id="dialog">
            <div class="dialog-card" id="dialog-card"></div>
        </div>
        <script type="module" src="/app.js"></script>
    </body>
</html>
