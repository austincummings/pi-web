<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>pi-web cockpit</title>
        <style>
            :root {
                /* defaults; overridden at runtime by the active pi theme
                   (settings.json -> themes/<name>.json) via a "theme" frame */
                --bg: #0b0f14;
                --panel: #121821;
                --line: #1f2a37;
                --txt: #d7e0ea;
                --muted: #9fb0c0;
                --dim: #7d8aa0;
                --acc: #6aa0ff;
                --acc2: #8b5cf6;
                --ok: #4ec9a3;
                --warn: #d9a441;
                --err: #e0556a;
            }
            *::selection {
                background: var(--acc);
                color: var(--bg);
            }
            *::-moz-selection {
                background: var(--acc);
                color: var(--bg);
            }
            *::-webkit-selection {
                background: var(--acc);
                color: var(--bg);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font:
                    14px/1.5 ui-monospace,
                    SFMono-Regular,
                    Menlo,
                    monospace;
                background: var(--bg);
                color: var(--txt);
                height: 100vh;
                display: flex;
            }
            .col {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            #center {
                flex: 1 1 auto;
                min-width: 0;
            }
            /* extension docks (left / right rails, bottom tray) */
            .dock.side {
                flex: 0 0 320px;
                min-width: 260px;
                overflow: auto;
                padding: 14px;
                display: flex;
                flex-direction: column;
                gap: 14px;
                background: var(--bg);
            }
            #dock-left {
                border-right: 1px solid var(--line);
            }
            #dock-right {
                border-left: 1px solid var(--line);
            }
            /* bottom = above the prompt; footer = below the prompt */
            .dock.bottom,
            .dock.footer {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                padding: 12px 14px;
                border-top: 1px solid var(--line);
            }
            .dock.bottom > .surface,
            .dock.footer > .surface {
                flex: 1 1 240px;
            }
            .dock.empty-dock {
                display: none;
            }
            header {
                padding: 10px 14px;
                border-bottom: 1px solid var(--line);
                display: flex;
                gap: 10px;
                align-items: center;
            }
            header b {
                color: var(--acc);
            }
            header .sp {
                flex: 1;
            }
            .thread-title {
                color: var(--txt);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 360px;
            }
            .thread-title .hint {
                color: var(--dim);
            }
            button {
                font: inherit;
                background: var(--panel);
                color: var(--txt);
                border: 1px solid var(--line);
                border-radius: 6px;
                padding: 5px 10px;
                cursor: pointer;
            }
            button:hover {
                border-color: var(--acc);
            }
            button.primary {
                background: var(--acc);
                border: none;
                color: #fff;
            }
            #transcript {
                flex: 1;
                overflow: auto;
                padding: 14px;
            }
            /* ---- Scrollbars: one consistent treatment everywhere ----------
               (transcript, composer, overlays, docks, picker, ...). Firefox
               uses scrollbar-width/-color; WebKit/Blink use the pseudo-elements
               below. The thumb is inset with a --bg border so it reads as a
               thin pill, and brightens to the accent on hover. */
            * {
                scrollbar-width: thin;
                scrollbar-color: var(--line) transparent;
            }
            *::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }
            *::-webkit-scrollbar-track {
                background: transparent;
            }
            *::-webkit-scrollbar-thumb {
                background: var(--line);
                border-radius: 8px;
                border: 2px solid var(--bg);
            }
            *::-webkit-scrollbar-thumb:hover {
                background: var(--acc);
            }
            *::-webkit-scrollbar-corner {
                background: transparent;
            }
            /* surface cards (docks) */
            .surface {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                overflow: hidden;
            }
            .surface > .stitle {
                padding: 8px 12px;
                border-bottom: 1px solid var(--line);
                color: var(--acc);
                font-size: 12px;
            }
            .surface > .sbody {
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            /* keyed status segments (bottom bar) */
            .statusbar {
                display: none;
                gap: 14px;
                padding: 4px 14px;
                border-top: 1px solid var(--line);
                color: var(--dim);
                font-size: 12px;
            }
            .statusbar.show {
                display: flex;
            }
            .statusbar .seg.right {
                margin-left: auto;
            }
            .statusbar .tone-accent {
                color: var(--acc);
            }
            .statusbar .tone-text {
                color: var(--txt);
            }
            .statusbar .tone-muted {
                color: var(--muted);
            }
            .statusbar .tone-dim {
                color: var(--dim);
            }
            .statusbar .tone-success {
                color: var(--ok);
            }
            .statusbar .tone-warning {
                color: var(--warn);
            }
            .statusbar .tone-error {
                color: var(--err);
            }
            /* extension overlays (modal surfaces) */
            #overlay-layer {
                position: fixed;
                inset: 0;
                display: none;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.5);
                z-index: 50;
            }
            #overlay-layer.show {
                display: flex;
            }
            .ov-card {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 12px;
                width: min(480px, 92vw);
                max-height: 80vh;
                overflow: auto;
                box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            }
            .ov-card > .ov-title {
                padding: 10px 14px;
                border-bottom: 1px solid var(--line);
                color: var(--acc);
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .ov-card > .ov-body {
                padding: 14px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            /* toasts (notify) */
            #toast-layer {
                position: fixed;
                right: 16px;
                bottom: 16px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                z-index: 60;
            }
            .toast {
                background: var(--panel);
                border: 1px solid var(--line);
                border-left-width: 3px;
                border-radius: 8px;
                padding: 8px 12px;
                max-width: 320px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
                font-size: 13px;
            }
            .toast.info {
                border-left-color: var(--acc);
            }
            .toast.warning {
                border-left-color: var(--warn);
            }
            .toast.error {
                border-left-color: var(--err);
            }
            .msg {
                margin: 0 0 12px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .msg .role {
                color: var(--dim);
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .msg.user .role {
                color: var(--acc);
            }
            .msg.assistant .role {
                color: var(--acc2);
            }
            .msg.assistant .body {
                white-space: normal;
            }
            .msg .body p {
                margin: 6px 0;
            }
            .msg .body h1,
            .msg .body h2,
            .msg .body h3,
            .msg .body h4 {
                margin: 10px 0 4px;
                line-height: 1.3;
            }
            .msg .body ul,
            .msg .body ol {
                margin: 6px 0;
                padding-left: 20px;
            }
            .msg .body a {
                color: var(--acc);
            }
            .msg .body code {
                background: #0c1117;
                border: 1px solid var(--line);
                border-radius: 4px;
                padding: 0 4px;
                font-size: inherit;
            }
            .msg .body pre {
                background: #0c1117;
                border: 1px solid var(--line);
                border-radius: 6px;
                padding: 8px 10px;
                overflow: auto;
                margin: 6px 0;
            }
            .msg .body pre code {
                background: none;
                border: none;
                padding: 0;
            }
            .msg .body blockquote {
                border-left: 2px solid var(--line);
                margin: 6px 0;
                padding-left: 10px;
                color: var(--dim);
            }
            /* The TUI conveys status by tinting the whole tool block (toolPendingBg /
               toolSuccessBg / toolErrorBg) rather than using a glyph, so we wash the
               entire card and match the left border to it. Default = success. */
            .tool {
                color: var(--dim);
                border-left: 2px solid var(--ok);
                background: color-mix(in srgb, var(--ok) 7%, #0c1117);
                padding: 5px 8px;
                margin: 6px 0;
                font-size: 13px;
                border-radius: 0 4px 4px 0;
            }
            .tool.pending {
                border-left-color: var(--acc);
                background: color-mix(in srgb, var(--acc) 10%, #0c1117);
            }
            .tool.error {
                border-left-color: var(--err);
                background: color-mix(in srgb, var(--err) 14%, #0c1117);
            }
            .tool-head {
                display: flex;
                align-items: baseline;
                white-space: nowrap;
                overflow: hidden;
            }
            .tool-mark:not(:empty) {
                color: var(--acc2);
                margin-right: 4px;
            }
            .tool.error .tool-mark {
                color: var(--err);
            }
            .tool-name {
                color: var(--acc);
                font-weight: 600;
                margin-right: 6px;
            }
            /* args ellipsize first (min-width:0); the muted suffix stays put. */
            .tool-args {
                color: var(--acc);
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .tool-dim {
                color: var(--dim);
                white-space: pre;
                flex-shrink: 0;
            }
            /* The card itself carries the status wash, so the body is transparent. */
            .tool-body {
                margin: 4px 0 0;
                padding: 0;
                background: none;
                color: var(--txt);
                font-size: 12px;
                white-space: pre-wrap;
                word-break: break-word;
                overflow-x: auto;
                max-width: 100%;
            }
            .tool-more {
                margin-top: 3px;
                color: var(--acc2);
                font-size: 12px;
                cursor: pointer;
                user-select: none;
            }
            .tool-more:hover {
                color: var(--acc);
            }
            .thinking-block {
                border-left: 2px solid var(--acc2);
                padding-left: 10px;
                margin: 8px 0;
                color: var(--dim);
                font-size: 13px;
            }
            .thinking-block .think-head {
                color: var(--acc2);
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                opacity: 0.85;
                cursor: pointer;
                user-select: none;
            }

            .thinking-block .think-body {
                margin-top: 4px;
                font-style: italic;
            }
            .thinking-block .think-body p {
                margin: 4px 0;
            }
            /* Ctrl+T (or clicking the header) collapses the trace, keeping
               just the label visible. Mirrors pi's hidden-thinking behavior. */
            body.hide-thinking .thinking-block .think-body {
                display: none;
            }
            body.hide-thinking .thinking-block .think-head::after {
                content: " (hidden)";
                opacity: 0.6;
                text-transform: none;
                letter-spacing: 0;
            }
            .bash {
                margin: 8px 0;
                border-left: 2px solid var(--acc2);
                padding-left: 8px;
            }
            .bash-cmd {
                color: var(--acc2);
                font-size: 13px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .bash .body {
                margin: 4px 0 0;
                white-space: pre-wrap;
                word-break: break-word;
                font-size: 13px;
                color: var(--txt);
            }
            .panel {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                overflow: hidden;
            }
            .panel > .ptitle {
                padding: 8px 12px;
                border-bottom: 1px solid var(--line);
                color: var(--acc);
                font-size: 12px;
            }
            .panel > .pbody {
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .divider {
                height: 1px;
                background: var(--line);
                margin: 4px 0;
            }
            input[type="text"] {
                font: inherit;
                background: #0c1117;
                border: 1px solid var(--line);
                color: var(--txt);
                border-radius: 6px;
                padding: 6px 8px;
                width: 100%;
            }
            .composer {
                position: relative;
            }
            /* "Working" spinner above the input (matches pi-tui: braille
               frames @ 80ms, accent spinner + muted label) */
            .working {
                display: none;
                align-items: center;
                gap: 8px;
                padding: 6px 14px 0;
                font-size: 12px;
                color: var(--dim);
            }
            .working.show {
                display: flex;
            }
            .working .spin {
                color: var(--acc);
                display: inline-block;
                width: 1ch;
                text-align: center;
            }
            form#ask {
                display: flex;
                gap: 8px;
                padding: 12px 14px;
                border-top: 1px solid var(--line);
                align-items: flex-end;
            }
            form#ask #prompt {
                flex: 1;
                font: inherit;
                background: #0c1117;
                border: 1px solid var(--line);
                color: var(--txt);
                border-radius: 6px;
                padding: 6px 8px;
                resize: none;
                overflow-y: auto;
                max-height: 200px;
                line-height: 1.4;
            }
            .empty {
                color: var(--dim);
            }
            /* startup / reload intro view (banner + loaded resources), echoing
               the pi TUI header. Rendered as the first transcript entry (scrolls
               with content) and click-to-expand (collapsed shows compact comma
               lists; expanded one per line). */
            .welcome {
                padding: 4px 0 10px;
                font-size: 13px;
                line-height: 1.5;
                cursor: pointer;
                user-select: none;
            }
            .welcome .logo {
                font-weight: 700;
                color: var(--acc);
            }
            .welcome .logo .ver {
                color: var(--dim);
                font-weight: 400;
            }
            .welcome .hints {
                color: var(--muted);
            }
            .welcome .onboard {
                color: var(--dim);
                margin-top: 4px;
            }
            .welcome .sections {
                margin-top: 8px;
            }
            .welcome .sec {
                margin-top: 4px;
            }
            .welcome .sec-name {
                color: var(--acc2);
                font-weight: 600;
            }
            .welcome .sec-items {
                color: var(--dim);
            }
            .welcome.expanded .sec-items {
                white-space: pre;
                display: block;
                margin-left: 1em;
            }
            .welcome .toggle {
                color: var(--dim);
                margin-top: 6px;
                font-size: 12px;
            }
            /* fuzzy command typeahead (above the prompt) */
            .ac {
                position: absolute;
                left: 14px;
                right: 14px;
                bottom: 100%;
                margin-bottom: 6px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 8px;
                overflow: hidden;
                display: none;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            }
            .ac.show {
                display: block;
            }
            .ac .opt {
                padding: 7px 12px;
                display: flex;
                gap: 12px;
                align-items: baseline;
                cursor: pointer;
            }
            .ac .opt.sel {
                background: #0c1117;
            }
            .ac .opt .cmd {
                color: var(--acc);
            }
            .ac .opt .desc {
                color: var(--dim);
                font-size: 12px;
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            /* /resume thread picker overlay */
            #overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                display: none;
                align-items: flex-start;
                justify-content: center;
            }
            #overlay.show {
                display: flex;
            }
            .picker {
                margin-top: 12vh;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                width: min(560px, 90vw);
                max-height: 70vh;
                overflow: auto;
            }
            .picker h3 {
                margin: 0;
                padding: 12px 14px;
                font-size: 12px;
                color: var(--dim);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                border-bottom: 1px solid var(--line);
            }
            .picker .item {
                padding: 10px 14px;
                border-bottom: 1px solid var(--line);
                cursor: pointer;
                display: flex;
                gap: 10px;
                align-items: baseline;
            }
            .picker .item:hover {
                background: #0c1117;
            }
            .picker .item .name {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .picker .item .meta {
                color: var(--dim);
                font-size: 12px;
            }
            .picker .item.active .name {
                color: var(--acc);
            }
            .picker .item.new {
                color: var(--acc2);
            }
        </style>
    </head>
    <body>
        <aside id="dock-left" class="dock side empty-dock"></aside>
        <div id="center" class="col">
            <header>
                <b>pi-web</b>
                <span
                    id="threadTitle"
                    class="thread-title"
                    title="current thread"
                    ><span class="hint">(loading…)</span></span
                >
                <span class="sp"></span>
                <span id="status" class="empty">connecting…</span>
            </header>
            <div id="transcript">
                <div class="empty">
                    Ask pi something, or use a dock registered by an extension →
                    <br />Type <b>/</b> for commands — <b>/resume</b> to switch
                    threads, <b>/new</b> for a fresh one. <br />Run shell with
                    <b>!</b> (output in context) or <b>!!</b> (local only).
                </div>
            </div>
            <div id="dock-bottom" class="dock bottom empty-dock"></div>
            <div class="composer">
                <div id="ac" class="ac"></div>
                <div id="working" class="working" aria-live="polite">
                    <span class="spin"></span
                    ><span class="label">Working…</span>
                </div>
                <form id="ask">
                    <textarea
                        id="prompt"
                        rows="1"
                        placeholder="message pi…  (/ commands · ! shell · @ files)"
                        autocomplete="off"
                        autofocus
                    ></textarea
                    ><button class="primary">send</button>
                </form>
            </div>
            <div id="dock-footer" class="dock footer empty-dock"></div>
            <div id="statusbar" class="statusbar"></div>
        </div>
        <aside id="dock-right" class="dock side empty-dock"></aside>
        <div id="overlay-layer"></div>
        <div id="toast-layer"></div>
        <div id="overlay"><div class="picker" id="picker"></div></div>
        <script type="module" src="/app.js"></script>
    </body>
</html>
