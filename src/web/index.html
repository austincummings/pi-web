<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>pi-web cockpit</title>
        <style>
            :root {
                --bg: #0b0f14;
                --panel: #121821;
                --line: #1f2a37;
                --txt: #d7e0ea;
                --dim: #7d8aa0;
                --acc: #6aa0ff;
                --acc2: #8b5cf6;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font:
                    14px/1.5 ui-monospace,
                    SFMono-Regular,
                    Menlo,
                    monospace;
                background: var(--bg);
                color: var(--txt);
                height: 100vh;
                display: flex;
            }
            .col {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            #left {
                flex: 1 1 60%;
                border-right: 1px solid var(--line);
            }
            #right {
                flex: 1 1 40%;
                min-width: 320px;
            }
            header {
                padding: 10px 14px;
                border-bottom: 1px solid var(--line);
                display: flex;
                gap: 10px;
                align-items: center;
            }
            header b {
                color: var(--acc);
            }
            header .sp {
                flex: 1;
            }
            .thread-title {
                color: var(--txt);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 360px;
            }
            .thread-title .hint {
                color: var(--dim);
            }
            button {
                font: inherit;
                background: var(--panel);
                color: var(--txt);
                border: 1px solid var(--line);
                border-radius: 6px;
                padding: 5px 10px;
                cursor: pointer;
            }
            button:hover {
                border-color: var(--acc);
            }
            button.primary {
                background: linear-gradient(90deg, var(--acc), var(--acc2));
                border: none;
                color: #fff;
            }
            #transcript {
                flex: 1;
                overflow: auto;
                padding: 14px;
            }
            #panels {
                flex: 1;
                overflow: auto;
                padding: 14px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .msg {
                margin: 0 0 12px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .msg .role {
                color: var(--dim);
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .msg.user .role {
                color: var(--acc);
            }
            .msg.assistant .role {
                color: var(--acc2);
            }
            .tool {
                color: var(--dim);
                border-left: 2px solid var(--line);
                padding-left: 8px;
                margin: 6px 0;
                font-size: 12px;
            }
            .bash {
                margin: 8px 0;
                border-left: 2px solid var(--acc2);
                padding-left: 8px;
            }
            .bash-cmd {
                color: var(--acc2);
                font-size: 12px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .bash .body {
                margin: 4px 0 0;
                white-space: pre-wrap;
                word-break: break-word;
                font-size: 12px;
                color: var(--txt);
            }
            .panel {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                overflow: hidden;
            }
            .panel > .ptitle {
                padding: 8px 12px;
                border-bottom: 1px solid var(--line);
                color: var(--acc);
                font-size: 12px;
            }
            .panel > .pbody {
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .divider {
                height: 1px;
                background: var(--line);
                margin: 4px 0;
            }
            input[type="text"] {
                font: inherit;
                background: #0c1117;
                border: 1px solid var(--line);
                color: var(--txt);
                border-radius: 6px;
                padding: 6px 8px;
                width: 100%;
            }
            .composer {
                position: relative;
            }
            form#ask {
                display: flex;
                gap: 8px;
                padding: 12px 14px;
                border-top: 1px solid var(--line);
            }
            form#ask input {
                flex: 1;
            }
            .empty {
                color: var(--dim);
            }
            /* fuzzy command typeahead (above the prompt) */
            .ac {
                position: absolute;
                left: 14px;
                right: 14px;
                bottom: 100%;
                margin-bottom: 6px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 8px;
                overflow: hidden;
                display: none;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            }
            .ac.show {
                display: block;
            }
            .ac .opt {
                padding: 7px 12px;
                display: flex;
                gap: 12px;
                align-items: baseline;
                cursor: pointer;
            }
            .ac .opt.sel {
                background: #0c1117;
            }
            .ac .opt .cmd {
                color: var(--acc);
            }
            .ac .opt .desc {
                color: var(--dim);
                font-size: 12px;
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            /* /resume thread picker overlay */
            #overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                display: none;
                align-items: flex-start;
                justify-content: center;
            }
            #overlay.show {
                display: flex;
            }
            .picker {
                margin-top: 12vh;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                width: min(560px, 90vw);
                max-height: 70vh;
                overflow: auto;
            }
            .picker h3 {
                margin: 0;
                padding: 12px 14px;
                font-size: 12px;
                color: var(--dim);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                border-bottom: 1px solid var(--line);
            }
            .picker .item {
                padding: 10px 14px;
                border-bottom: 1px solid var(--line);
                cursor: pointer;
                display: flex;
                gap: 10px;
                align-items: baseline;
            }
            .picker .item:hover {
                background: #0c1117;
            }
            .picker .item .name {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .picker .item .meta {
                color: var(--dim);
                font-size: 12px;
            }
            .picker .item.active .name {
                color: var(--acc);
            }
            .picker .item.new {
                color: var(--acc2);
            }
        </style>
    </head>
    <body>
        <div id="left" class="col">
            <header>
                <b>pi-web</b>
                <span
                    id="threadTitle"
                    class="thread-title"
                    title="current thread"
                    ><span class="hint">(loading…)</span></span
                >
                <span class="sp"></span>
                <span id="status" class="empty">connecting…</span>
            </header>
            <div id="transcript">
                <div class="empty">
                    Ask pi something, or use the self-registered panel →
                    <br />Type <b>/</b> for commands — <b>/resume</b> to switch
                    threads, <b>/new</b> for a fresh one. <br />Run shell with
                    <b>!</b> (output in context) or <b>!!</b> (local only).
                </div>
            </div>
            <div class="composer">
                <div id="ac" class="ac"></div>
                <form id="ask">
                    <input
                        id="prompt"
                        type="text"
                        placeholder="message pi…  (/ commands · ! shell)"
                        autocomplete="off"
                        autofocus
                    /><button class="primary">send</button>
                </form>
            </div>
        </div>
        <div id="right" class="col">
            <header>
                <b>panels</b
                ><span class="dim">defined by extensions via piweb</span
                ><span class="sp"></span><button id="reload">reload ext</button>
            </header>
            <div id="panels"><div class="empty">no panels yet</div></div>
        </div>
        <div id="overlay"><div class="picker" id="picker"></div></div>
        <script type="module" src="/app.js"></script>
    </body>
</html>
